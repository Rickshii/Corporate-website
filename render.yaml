services:
  - type: web
    name: values-vruksha-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: ADMIN_SECRET_KEY
        value: values-vruksha-secret-2026
      - key: DATABASE_URL
        value: file:./dev.db
